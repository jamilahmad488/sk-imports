<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Imports — Mobile Accessories & Electronic Gadgets Wholesale Rawalpindi</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="SK Imports Rawalpindi: Direct China imports of mobile accessories, chargers, and gadgets at wholesale prices. Fast delivery in Rawalpindi & Islamabad.">
    <meta name="keywords" content="Mobile Accessories, Wholesale, Rawalpindi, Imperial Market, SK Imports, Chargers, Power Banks">
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* [KEEPING YOUR ORIGINAL STYLES + IMPROVEMENTS] */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#1a237e;--accent:#FF8F00;--green:#25D366;--red:#e53935;--bg:#f4f6fb;--white:#fff;--border:#e0e6f0;--text:#1a1a2e;--muted:#64748b;--nav-h:64px;--font-head:'Rajdhani',sans-serif;--font-body:'Nunito',sans-serif}
        
        body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh; scroll-behavior: smooth;}
        
        /* Layout Components */
        .topbar{background:var(--primary);color:#fff;font-size:12px;padding:6px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
        .topbar a{color:#FFB300;text-decoration:none;font-weight:600}
        
        nav{background:var(--white);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(26,35,126,0.08)}
        .nav-inner{max-width:1280px;margin:0 auto;padding:0 20px;height:var(--nav-h);display:flex;align-items:center;gap:16px}
        
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
        .logo-icon{width:44px;height:44px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:700;font-size:20px;color:#FFB300;flex-shrink:0}
        .logo-text{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--primary);line-height:1}
        
        .search-bar{flex:1;max-width:520px;position:relative;margin:0 12px}
        .search-bar input{width:100%;padding:10px 44px 10px 16px;border:2px solid var(--border);border-radius:25px;font-size:14px;outline:none;transition:0.2s}
        .search-bar input:focus{border-color:var(--primary); background:#fff}
        
        .cat-bar{background:var(--primary);overflow-x:auto; white-space: nowrap; sticky; top: 64px; z-index: 999;}
        .cat-bar-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex}
        .cat-item{color:rgba(255,255,255,0.8);padding:14px 18px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;border-bottom:3px solid transparent}
        .cat-item:hover, .cat-item.active{color:#FFB300; border-bottom-color:#FFB300; background:rgba(255,255,255,0.05)}

        /* Hero */
        .hero{background:linear-gradient(135deg,#1a237e 0%,#283593 100%);padding:60px 20px;text-align:center;color:#fff}
        .hero h1{font-family:var(--font-head);font-size:clamp(32px, 5vw, 52px);margin-bottom:15px}
        .hero span{color:var(--accent)}
        
        /* Grid */
        .section{max-width:1280px;margin:0 auto;padding:40px 20px}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
        
        /* Product Cards */
        .product-card{background:#fff; border-radius:16px; border:1px solid var(--border); overflow:hidden; transition:0.3s; position:relative; display:flex; flex-direction:column}
        .product-card:hover{transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.1)}
        .product-img{width:100%; height:180px; background:#f8f9fa; display:flex; align-items:center; justify-content:center; overflow:hidden}
        .product-img img{width:100%; height:100%; object-fit: cover}
        .product-body{padding:15px; flex-grow:1; display:flex; flex-direction:column}
        .product-name{font-weight:700; font-size:15px; margin-bottom:8px}
        .product-price{margin:10px 0; display:flex; align-items:center; gap:10px}
        .price-ws{color:var(--primary); font-weight:800; font-size:18px; font-family:var(--font-head)}
        .price-rt{text-decoration:line-through; color:var(--muted); font-size:12px}

        .btn-group{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:auto}
        .btn-wa{text-decoration:none; padding:8px; border-radius:8px; font-size:12px; font-weight:700; text-align:center; color:#fff; transition:0.2s}
        .wa-sohail{background:var(--green)}
        .wa-jawad{background:#128C7E}

        /* Utilities */
        .badge{position:absolute; top:10px; left:10px; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:800; text-transform:uppercase; z-index:1}
        .badge-hot{background:var(--accent); color:#fff; right:10px; left:auto}
        .badge-stock{background:#e8f5e9; color:#2e7d32}
        .badge-out{background:#ffebee; color:#c62828}

        #backToTop {position:fixed; bottom:100px; right:20px; background:var(--primary); color:#fff; width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; display:none; z-index:999}

        @media(max-width:768px){
            .products-grid{grid-template-columns:repeat(2,1fr); gap:10px}
            .hero-stats{display:none}
        }
    </style>
</head>
<body>

<div class="topbar">
    <span>?? Imperial Market, Liaqat Road, Rawalpindi</span>
    <span>?? Sohail: 0307-3342017 | Jawad: 0327-5238548</span>
</div>

<nav>
    <div class="nav-inner">
        <a href="#" class="logo">
            <div class="logo-icon">SK</div>
            <div class="logo-text">SK Imports</div>
        </a>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search 500+ products..." onkeyup="filterProducts()">
        </div>
    </div>
</nav>

<div class="cat-bar">
    <div class="cat-bar-inner" id="categoryBar">
        <!-- Categories generated by JS -->
    </div>
</div>

<div class="hero">
    <h1>Direct <span>China Imports</span><br>At Wholesale Prices</h1>
    <p>Premium Mobile Accessories. Quality Tested. Same Day Delivery.</p>
</div>

<div class="section">
    <div class="products-grid" id="productContainer">
        <!-- Products generated by JS -->
    </div>
</div>

<button id="backToTop" onclick="window.scrollTo(0,0)">?</button>

<script>
    // 1. CONFIGURATION - Change numbers here once
    const CONTACT_SOHAIL = "923073342017";
    const CONTACT_JAWAD = "923275238548";

    // 2. INVENTORY DATA - Add your 500 products here easily
    const products = [
        {
            id: 1,
            name: "Type-C Fast Charging Cable (3A)",
            category: "cables",
            desc: "Braided nylon, durable 1 meter",
            retail: 280,
            wholesale: 140,
            stock: true,
            hot: true,
            img: "https://images.unsplash.com/photo-1589492477829-5e65395b66cc?w=400&q=80"
        },
        {
            id: 2,
            name: "65W GaN Dual Port Charger",
            category: "chargers",
            desc: "Ultra fast PD charging for laptops/phones",
            retail: 1200,
            wholesale: 650,
            stock: true,
            hot: true,
            img: "" // Empty string will show placeholder
        },
        {
            id: 3,
            name: "iPhone Lightning Cable MFi",
            category: "cables",
            desc: "Original chip, no error messages",
            retail: 450,
            wholesale: 210,
            stock: false,
            hot: false,
            img: ""
        },
        {
            id: 4,
            name: "TWS M10 Earbuds",
            category: "earphones",
            desc: "Best selling powerbank earbuds",
            retail: 1500,
            wholesale: 850,
            stock: true,
            hot: true,
            img: ""
        }
        // Add more products here...
    ];

    const categories = [
        { id: 'all', name: 'All Products', icon: '???' },
        { id: 'cables', name: 'Data Cables', icon: '??' },
        { id: 'chargers', name: 'Chargers', icon: '?' },
        { id: 'powerbanks', name: 'Power Banks', icon: '??' },
        { id: 'earphones', name: 'Earphones', icon: '??' },
        { id: 'gadgets', name: 'Gadgets', icon: '???' }
    ];

    // 3. ENGINE - Renders everything
    function init() {
        renderCategories();
        renderProducts(products);
    }

    function renderCategories() {
        const bar = document.getElementById('categoryBar');
        bar.innerHTML = categories.map(cat => `
            <a class="cat-item ${cat.id==='all'?'active':''}" onclick="filterByCategory('${cat.id}', this)">
                ${cat.icon} ${cat.name}
            </a>
        `).join('');
    }

    function renderProducts(items) {
        const container = document.getElementById('productContainer');
        if(items.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b;">No products found matching your search.</div>`;
            return;
        }

        container.innerHTML = items.map(item => {
            const waMsg = encodeURIComponent(`Hello SK Imports! I want to order: ${item.name}`);
            const imgHtml = item.img ? `<img src="${item.img}" alt="${item.name}" loading="lazy">` : `<span style="font-size:40px; opacity:0.2">??</span>`;
            
            return `
                <div class="product-card">
                    ${item.hot ? `<div class="badge badge-hot">?? Hot Selling</div>` : ''}
                    <div class="badge badge-stock ${item.stock ? '' : 'badge-out'}">
                        ${item.stock ? '? In Stock' : '? Out of Stock'}
                    </div>
                    <div class="product-img">${imgHtml}</div>
                    <div class="product-body">
                        <div class="product-name">${item.name}</div>
                        <div style="font-size:12px; color:#64748b; margin-bottom:10px">${item.desc}</div>
                        <div class="product-price">
                            <span class="price-ws">Rs ${item.wholesale}</span>
                            <span class="price-rt">Rs ${item.retail}</span>
                        </div>
                        <div class="btn-group">
                            <a href="https://wa.me/${CONTACT_SOHAIL}?text=${waMsg}" target="_blank" class="btn-wa wa-sohail">Order Sohail</a>
                            <a href="https://wa.me/${CONTACT_JAWAD}?text=${waMsg}" target="_blank" class="btn-wa wa-jawad">Order Jawad</a>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 4. FILTER & SEARCH LOGIC
    let currentCategory = 'all';

    function filterByCategory(catId, el) {
        currentCategory = catId;
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        filterProducts();
    }

    function filterProducts() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = products.filter(p => {
            const matchesCat = currentCategory === 'all' || p.category === currentCategory;
            const matchesSearch = p.name.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query);
            return matchesCat && matchesSearch;
        });
        
        renderProducts(filtered);
    }

    // Back to top scroll observer
    window.onscroll = function() {
        const btn = document.getElementById("backToTop");
        btn.style.display = (window.scrollY > 500) ? "block" : "none";
    };

    // Run on load
    init();
</script>

</body>
</html>
